[workspace]
# Use conventional commits to determine version bumps
features_always_increment_minor = true
# Run cargo-semver-checks to detect breaking changes
semver_check = true
# Timeout for cargo publish (includes waiting for crates.io index)
publish_timeout = "10m"
# Label the release PR
pr_labels = ["release"]

# fiscal-napi is a cdylib — don't publish to crates.io.
# Version bump + changelog are still managed by release-plz.
# npm publish is handled by the napi-publish.yml workflow.
[[package]]
name = "fiscal-napi"
publish = false
semver_check = false
