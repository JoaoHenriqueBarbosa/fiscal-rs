name: Publish @fiscal-rs/node to npm

on:
  push:
    tags:
      - 'fiscal-napi-v*'

permissions:
  contents: read

env:
  APP_NAME: fiscal
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: crates/fiscal-napi

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      # Cross-compilation support for Linux ARM
      - name: Install cross-compilation tools (aarch64-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: napi-rs/setup-cross-toolchain-action@v1
        with:
          target: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools (x86_64-linux-musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: napi-rs/setup-cross-toolchain-action@v1
        with:
          target: x86_64-unknown-linux-musl

      - name: Install cross-compilation tools (aarch64-linux-musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: napi-rs/setup-cross-toolchain-action@v1
        with:
          target: aarch64-unknown-linux-musl

      # OpenSSL for Linux native builds
      - name: Install OpenSSL (Linux native)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build native addon
        run: npx napi build --release --platform --target ${{ matrix.target }} --manifest-path ../../crates/fiscal-napi/Cargo.toml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/fiscal-napi/${{ env.APP_NAME }}*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: crates/fiscal-napi
        run: npm ci

      # Extract version from git tag (fiscal-napi-v0.2.0 → 0.2.0)
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#fiscal-napi-v}" >> $GITHUB_OUTPUT

      # Sync version into all package.json files
      - name: Sync version to package.json
        working-directory: crates/fiscal-napi
        run: npx napi version --no-git ${{ steps.version.outputs.VERSION }}

      # Download all platform binaries
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: crates/fiscal-napi/artifacts

      # Move binaries into the correct npm/<platform>/ dirs
      - name: Move artifacts
        working-directory: crates/fiscal-napi
        run: npx napi artifacts --dir artifacts

      # List what we're publishing
      - name: List packages
        working-directory: crates/fiscal-napi
        run: |
          echo "=== Main package ==="
          cat package.json | head -5
          echo ""
          echo "=== Platform packages ==="
          for d in npm/*/; do
            echo "$d: $(ls "$d"*.node 2>/dev/null | wc -l) binary"
          done

      # Publish platform packages first, then main package
      - name: Publish to npm
        working-directory: crates/fiscal-napi
        run: npx napi prepublish --skip-gh-release -t npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        working-directory: crates/fiscal-napi
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
